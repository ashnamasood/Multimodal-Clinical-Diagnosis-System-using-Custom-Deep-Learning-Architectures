<svg viewBox="0 0 500 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="500" height="400" fill="#f8fafb"/>
  
  <!-- Main Dashboard Panel -->
  <rect x="20" y="20" width="460" height="360" rx="12" fill="#ffffff" stroke="#e0e6ed" stroke-width="2"/>
  
  <!-- Header Bar -->
  <rect x="20" y="20" width="460" height="50" rx="12" fill="#0077b6" opacity="0.08"/>
  <text x="35" y="50" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#072a4b">Clinical Dashboard</text>
  
  <!-- Status Indicator -->
  <circle cx="450" cy="45" r="6" fill="#10b981"/>
  <text x="420" y="48" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#6b7280">Ready</text>
  
  <!-- Divider -->
  <line x1="35" y1="85" x2="465" y2="85" stroke="#e0e6ed" stroke-width="1"/>
  
  <!-- Left Panel: Chest X-ray -->
  <g>
    <rect x="35" y="105" width="200" height="150" rx="8" fill="#f0f7ff" stroke="#d4e6f1" stroke-width="1.5"/>
    <text x="45" y="125" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#0077b6">Chest X-ray</text>
    
    <!-- Mini X-ray placeholder -->
    <rect x="45" y="135" width="80" height="100" rx="4" fill="#e8eef5" stroke="#c5d9e8" stroke-width="1"/>
    <circle cx="85" cy="180" r="20" fill="#d4dce6" opacity="0.6"/>
    <circle cx="85" cy="180" r="12" fill="#c5d9e8"/>
    
    <!-- Confidence bars -->
    <text x="135" y="140" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#6b7280">Pneumonia: 78%</text>
    <rect x="135" y="148" width="85" height="6" rx="3" fill="#e5e7eb"/>
    <rect x="135" y="148" width="66" height="6" rx="3" fill="#0077b6"/>
    
    <text x="135" y="165" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#6b7280">Nodule: 34%</text>
    <rect x="135" y="173" width="85" height="6" rx="3" fill="#e5e7eb"/>
    <rect x="135" y="173" width="29" height="6" rx="3" fill="#0077b6"/>
    
    <text x="135" y="190" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#6b7280">Normal: 88%</text>
    <rect x="135" y="198" width="85" height="6" rx="3" fill="#e5e7eb"/>
    <rect x="135" y="198" width="75" height="6" rx="3" fill="#10b981"/>
  </g>
  
  <!-- Right Panel: Risk Score -->
  <g>
    <rect x="265" y="105" width="200" height="150" rx="8" fill="#fff8f0" stroke="#fde4d4" stroke-width="1.5"/>
    <text x="275" y="125" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#d97706">Overall Risk</text>
    
    <!-- Risk Gauge -->
    <circle cx="350" cy="165" r="35" fill="none" stroke="#e5e7eb" stroke-width="8"/>
    <circle cx="350" cy="165" r="35" fill="none" stroke="#0077b6" stroke-width="8" stroke-dasharray="55 185" stroke-linecap="round"/>
    <text x="335" y="175" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="700" fill="#0077b6">68%</text>
    
    <!-- Risk level badge -->
    <rect x="275" y="220" width="150" height="25" rx="6" fill="#fef3c7" stroke="#fcd34d" stroke-width="1"/>
    <text x="350" y="237" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#b45309" text-anchor="middle">Moderate Risk</text>
  </g>
  
  <!-- Bottom Section: Cardiac & Skin -->
  <g>
    <!-- Cardiac Panel -->
    <rect x="35" y="275" width="95" height="95" rx="8" fill="#f0fdf4" stroke="#d1f3d6" stroke-width="1.5"/>
    <text x="45" y="295" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#059669">Cardiac</text>
    
    <!-- Mini heart icon -->
    <path d="M60 310 Q60 305 65 305 Q70 305 70 310 L70 330 Q70 335 65 338 Q60 335 60 330 Z" fill="#10b981" opacity="0.3"/>
    <text x="45" y="355" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#6b7280">HR: 72 bpm</text>
    <text x="45" y="368" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#6b7280">BP: 120/80</text>
    
    <!-- Skin Panel -->
    <rect x="150" y="275" width="95" height="95" rx="8" fill="#fef3f2" stroke="#fee4e2" stroke-width="1.5"/>
    <text x="160" y="295" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#dc2626">Skin</text>
    
    <!-- Mini skin icon -->
    <circle cx="170" cy="320" r="8" fill="#fca5a5" opacity="0.4"/>
    <circle cx="180" cy="328" r="6" fill="#fca5a5" opacity="0.4"/>
    <text x="160" y="355" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#6b7280">Melanoma</text>
    <text x="160" y="368" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#6b7280">Risk: 45%</text>
    
    <!-- Recommendation -->
    <rect x="265" y="275" width="200" height="95" rx="8" fill="#eff6ff" stroke="#dbeafe" stroke-width="1.5"/>
    <text x="275" y="295" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#0077b6">Recommendation</text>
    
    <text x="275" y="315" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#072a4b">✓ Further review recommended</text>
    <text x="275" y="330" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#072a4b">✓ Consult specialist</text>
    <text x="275" y="345" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#072a4b">✓ Schedule follow-up</text>
  </g>
</svg>
